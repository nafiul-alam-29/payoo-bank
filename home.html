<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payoo Bank | Home</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon">

    <!-- tailwind + daisy ui cdn -->

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    

    <!-- fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen max-w-md mx-auto bg-base-200">
    
<header class="border-b-2 border-gray-300">
    <section class="w-11/12 mx-auto py-3 flex justify-between items-center">
        <div class="left flex gap-1">
            <div class="logo w-[60px]">
                <img src="assets/logo.png" alt="">
            </div>
            <div class="balance-info">
                <h2 class="balance-info text-2xl font-bold"> $<span id="current-balance">1250</span></h2>
                <p class="text-neutral/50">Avalible Balance</p>
            </div>
        </div>
        <div class="right">
            <a href="index.html" class="btn btn-soft"> <i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a>
        </div>
    </section>
</header>

<section class="w-11/12 mx-auto py-10 space-y-5">
    <h2 class="text-3xl ">Welcome to Pay<span class="text-primary">oo</span>
    <p class="text-neutral/50">Enjoy easy and convenient financial services with us. Cashout charge is low and </p>

    <div class="button grid grid-cols-3 gap-3">
        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-1.png" alt="">
            <p>Add Money</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-2.png" alt="">
            <p>Cash Out</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-3.png" alt="">
            <p>Send Money</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-4.png" alt="">
            <p>Get Bonus</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-5.png" alt="">
            <p>Pay Bill</p>
        </button>

        <button class="btn flex-col h-full py-4 btn-primary btn-soft">
            <img src="assets/opt-6.png" alt="">
            <p>Transactions</p>
        </button>
    </div>
</section>

<section id="cash-out" class="w-11/12 mx-auto py-5">
    <h2 class="text-xl font-bold"> Cash Out</h2>
    <div class="form pt-10">
        <div class="card bg-base-100 w-full rounded-2xl "> 
            <div class="card-body">
                <fieldset class="fieldset">
                <label class="label text-neutral font-bold ">Agent Number</label>
                <input id="cashout-number" maxlength="11" minlength="11" type="email" class="input w-full rounded-full bg-base-200" placeholder="Enter Your Agent Number" />
                <br>

                <label class="label text-neutral font-bold ">Amount</label>
                <input id="cashout-amount" maxlength="11" minlength="11" type="email" class="input w-full rounded-full bg-base-200" placeholder="Amount" />
                <br>

                <label class="label text-neutral font-bold">4 Digit Pin</label>
                <input id="cashout-pin" maxlength="4" type="password" class="input rounded-full w-full bg-base-200" placeholder="Enter 4 Digit Pin " />
                <div><a class="link link-hover">Forgot password?</a></div>
                <button id="cashout-btn" class="btn btn-primary mt-4 rounded-full">Withdraw Amount</button>
                </fieldset>
            </div>
         </div>
    </div>

</section>

<script src="cashout.js"></script>
<script src="machine.js"></script>
</body>
</html>
